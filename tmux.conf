# TPM - Tmux Plugin Manager
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'

# Navigation & pane control
set -g @plugin 'tmux-plugins/tmux-pain-control'
set -g @plugin 'christoomey/vim-tmux-navigator'

# Mouse
set -g @plugin 'NHDaly/tmux-better-mouse-mode'

# Copy & clipboard
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'CrispyConductor/tmux-copy-toolkit'
set -g @plugin 'abhinav/tmux-fastcopy'

# URL & file opening
set -g @plugin 'tmux-plugins/tmux-open'
set -g @plugin 'wfxr/tmux-fzf-url'

# Session management
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'omerxx/tmux-sessionx'

# Fuzzy finder integration
set -g @plugin 'sainnhe/tmux-fzf'

# UI helpers
set -g @plugin 'Freed-Wu/tmux-digit'
set -g @plugin 'anghootys/tmux-ip-address'
set -g @plugin 'tmux-plugins/tmux-prefix-highlight'
set -g @plugin 'alexwforsythe/tmux-which-key'
set -g @plugin 'jaclu/tmux-menus'
set -g @plugin '2KAbhishek/tmux2k'

# ─── tmux2k theme ────────────────────────────────────────────────────────────
set -g @tmux2k-theme 'onedark'
set -g @tmux2k-icons-only true
set -g @tmux2k-left-plugins "git cwd docker mise"
set -g @tmux2k-right-plugins "cpu ram network time"
set -g @tmux2k-time-format "%H:%M"
set -g @tmux2k-show-powerline true
set -g @tmux2k-show-left-sep ""
set -g @tmux2k-show-right-sep ""

# ─── Mouse ───────────────────────────────────────────────────────────────────
set -g mouse on
set -g @scroll-down-exit-copy-mode "on"
set -g @scroll-without-changing-pane "on"
set -g @emulate-scroll-for-no-mouse-alternate-buffer "on"

# ─── Session persistence ─────────────────────────────────────────────────────
set -g @resurrect-capture-pane-contents 'on'
set -g @continuum-restore 'on'
set -g @continuum-save-interval '10'

# ─── Plugin keybinds (safe — no default tmux key conflicts) ──────────────────

# tmux-sessionx: 'o' conflicts with default rotate-pane → use 'S'
set -g @sessionx-bind 'S'

# tmux-fastcopy: default 'f' conflicts with find-window → use 'F'
set -g @fastcopy-bind 'F'

# tmux-fzf-url: 'u' is not a default binding
set -g @fzf-url-bind 'u'

# tmux-menus: default '\' conflicts with pain-control; 'M' conflicts with select-pane -M → use 'g'
set -g @menus_trigger 'g'

# tmux-yank: no conflict
set -g @yank_action 'copy-pipe-no-clear'

# ─── Initialize TPM (keep at bottom) ─────────────────────────────────────────
run '~/.tmux/plugins/tpm/tpm'

# ─── Restore defaults overridden by plugins ───────────────────────────────────
# tmux-pain-control binds prefix+l to select-pane-right, overriding last-window
bind-key l last-window
# prefix+Space → tmux-which-key (intentional — next-layout available via prefix+Alt+1–5)
